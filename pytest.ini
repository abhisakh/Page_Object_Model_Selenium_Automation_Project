[pytest]
# Test Discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    smoke: Quick smoke tests for critical functionality
    regression: Full regression test suite
    bug_tracker: Bug verification tests (inverted assertions)
    critical: Critical functionality tests
    skip_ci: Tests to skip in CI/CD pipeline
    slow: Slow running tests
    integration: Integration tests
    unit: Unit tests

# Output Options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (requires pytest-timeout)
# timeout = 300

# HTML Report (requires pytest-html)
# html = reports/report.html
# self_contained_html = true

# Coverage (requires pytest-cov)
# addopts = --cov=. --cov-report=html

# Minimum Python Version
minversion = 6.0

# DocTest
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# Ignore paths
norecursedirs = .git .venv venv env build dist .pytest_cache __pycache__
